<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>个人作品集</title>
  <style>
    :root {
      --bg: #f4f6f9;
      --card: #ffffff;
      --text: #222;
      --primary: #4a90e2;
      --nav: #222;
    }

    body.dark {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #e5e7eb;
      --primary: #60a5fa;
      --nav: #111827;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      transition: 0.3s;
    }

    header {
      padding: 80px 20px;
      text-align: center;
      background: linear-gradient(135deg, var(--primary), #6fb1fc);
      color: white;
    }

    header img {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      margin-bottom: 15px;
      border: 3px solid white;
    }

    header h1 {
      font-size: 32px;
    }

    nav {
      position: sticky;
      top: 0;
      background: var(--nav);
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      z-index: 10;
    }

    nav a {
      color: white;
      padding: 12px 18px;
      text-decoration: none;
      transition: 0.3s;
    }

    nav a:hover {
      background: var(--primary);
    }

    .toggle {
      position: absolute;
      right: 15px;
      top: 10px;
      background: var(--primary);
      border: none;
      color: white;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    section {
      max-width: 900px;
      margin: 40px auto;
      padding: 25px;
      background: var(--card);
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      opacity: 0;
      transform: translateY(20px);
      animation: fadeIn 0.8s forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h2 {
      color: var(--primary);
      margin-bottom: 15px;
    }

    .skills span {
      display: inline-block;
      padding: 6px 12px;
      margin: 5px;
      border-radius: 20px;
      background: rgba(74,144,226,0.15);
      color: var(--primary);
    }

    .project {
      padding: 15px;
      margin-bottom: 12px;
      border-left: 4px solid var(--primary);
      background: rgba(0,0,0,0.03);
      border-radius: 8px;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: var(--nav);
      color: white;
      margin-top: 40px;
    }

    @media (max-width: 600px) {
      header h1 { font-size: 24px; }
    }
  </style>
</head>
<body>

<header>
  <img src="https://via.placeholder.com/90" alt="avatar" />
  <h1>你好，我是你的名字</h1>
  <p>一个正在成长的开发者 / 创作者</p>
</header>

<nav>
  <a href="#about">关于我</a>
  <a href="#skills">技能</a>
  <a href="#projects">项目</a>
  <a href="#contact">联系</a>
  <button class="toggle" onclick="toggleDark()">🌙</button>
</nav>

<section id="about">
  <h2>关于我</h2>
  <p>这里写你的个人介绍，比如学习经历、兴趣方向、目标等。</p>
</section>

<section id="skills">
  <h2>技能</h2>
  <div class="skills">
    <span>HTML</span>
    <span>CSS</span>
    <span>JavaScript</span>
    <span>学习中...</span>
  </div>
</section>

<section id="projects">
  <h2>项目展示</h2>

  <div class="project">
    <h3>项目一</h3>
    <p>项目描述 + 技术栈 + 做了什么</p>
    <p><a href="#">GitHub链接</a></p>
  </div>

  <div class="project">
    <h3>项目二</h3>
    <p>项目描述 + 技术栈</p>
    <p><a href="#">GitHub链接</a></p>
  </div>

</section>

<section id="contact">
  <h2>联系我</h2>
  <p>邮箱：example@email.com</p>
  <p>GitHub / 微信 / 其他联系方式</p>
</section>

<footer>
  © 2026 个人作品集 | 已优化上线版本
</footer>

<script>
  function toggleDark() {
    document.body.classList.toggle('dark');
  }
</script>

</body>
</html>
